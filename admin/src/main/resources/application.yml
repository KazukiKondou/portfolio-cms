spring:
  application:
    name: portfolio-admin

  # 本番では site と同じ PostgreSQL を見るが、開発時は別の H2 インメモリで OK
  datasource:
    url: jdbc:h2:mem:portfolio-admin;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

server:
  # site と被らない別ポート
  port: 8081

# 管理画面のログイン情報。本番では環境変数で必ず上書きする
app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin}
