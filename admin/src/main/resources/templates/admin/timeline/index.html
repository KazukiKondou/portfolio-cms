<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timeline — Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/admin :: header}"></header>

  <main>
    <section class="admin-edit">
      <div class="container">
        <div class="breadcrumb">
          <a href="/admin">← ダッシュボード</a>
        </div>

        <h1 class="page-title">Timeline (略歴)</h1>
        <p class="hint">古い順に並ぶ。月が分からない場合は空欄でOK。</p>

        <div th:if="${message}" class="alert alert-info" th:text="${message}">メッセージ</div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}">エラー</div>

        <div class="admin-list-actions">
          <a href="/admin/timeline/new" class="btn-primary">＋ 新規作成</a>
        </div>

        <ul class="admin-list">
          <li class="admin-list-item" th:each="ev : ${events}">
            <div>
              <span class="item-title" th:text="${ev.title}">タイトル</span>
              <span th:unless="${ev.published}" class="badge-draft">非公開</span>
              <p class="item-meta">
                <span th:text="${ev.dateLabel}">2018年</span> ·
                <span th:text="|sort: ${ev.sortOrder}|">sort: 0</span>
              </p>
            </div>
            <div class="item-actions">
              <a th:href="@{|/admin/timeline/${ev.id}/edit|}">編集</a>
              <form method="post" th:action="@{|/admin/timeline/${ev.id}/delete|}"
                    onsubmit="return confirm('削除しますか？');" style="display: inline;">
                <button type="submit" class="item-delete">削除</button>
              </form>
            </div>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/admin :: footer}"></footer>

</body>

</html>
