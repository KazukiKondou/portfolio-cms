<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ — Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/admin :: header}"></header>

  <main>
    <section class="admin-edit">
      <div class="container">
        <div class="breadcrumb">
          <a href="/admin">← ダッシュボード</a>
        </div>

        <h1 class="page-title">お問い合わせ</h1>

        <div th:if="${message}" class="alert alert-info" th:text="${message}">メッセージ</div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}">エラー</div>

        <p th:if="${messages.empty}" class="hint">まだメッセージがありません。</p>

        <ul class="admin-list" th:unless="${messages.empty}">
          <li class="admin-list-item" th:each="msg : ${messages}">
            <div>
              <a th:href="@{|/admin/messages/${msg.id}|}" class="item-title" th:text="${msg.name}">名前</a>
              <span th:if="${msg.unread}" class="badge-draft" style="background: #fff1f1; color: #b91515;">未読</span>
              <p class="item-meta">
                <span th:text="${msg.email}">email</span> ·
                <span th:text="${#temporals.format(msg.createdAt, 'yyyy-MM-dd HH:mm')}">日時</span>
              </p>
            </div>
            <div class="item-actions">
              <a th:href="@{|/admin/messages/${msg.id}|}">詳細</a>
              <form method="post" th:action="@{|/admin/messages/${msg.id}/delete|}"
                    onsubmit="return confirm('削除しますか？');" style="display: inline;">
                <button type="submit" class="item-delete">削除</button>
              </form>
            </div>
          </li>
        </ul>
      </div>
    </section>
  </main>

</body>

</html>
