<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>メッセージ詳細 — Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/admin :: header}"></header>

  <main>
    <section class="admin-edit">
      <div class="container">
        <div class="breadcrumb">
          <a href="/admin/messages">← お問い合わせ一覧</a>
        </div>

        <h1 class="page-title" th:text="${message.name}">名前</h1>
        <p class="hint">
          <span th:text="${message.email}">email</span> ·
          <span th:text="${#temporals.format(message.createdAt, 'yyyy-MM-dd HH:mm')}">日時</span>
        </p>

        <div class="message-body">
          <p th:text="${message.message}" style="white-space: pre-wrap; padding: 24px 0; font-size: 16px;">本文</p>
        </div>

        <div class="form-actions">
          <a th:href="|mailto:${message.email}|" class="btn-primary">返信を書く</a>
          <a href="/admin/messages" class="btn-cancel">一覧に戻る</a>
        </div>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/admin :: footer}"></footer>

</body>

</html>
