<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${isNew} ? 'スキル 新規作成 — Admin' : 'スキル 編集 — Admin'">スキル — Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/admin :: header}"></header>

  <main>
    <section class="admin-edit">
      <div class="container">
        <div class="breadcrumb">
          <a href="/admin/skills">← スキル一覧</a>
        </div>

        <h1 class="page-title" th:text="${isNew} ? '新規作成' : '編集'">編集</h1>

        <form method="post"
              th:action="${isNew} ? @{/admin/skills} : @{|/admin/skills/${skill.id}|}"
              th:object="${skill}" class="edit-form">

          <div class="form-row">
            <label for="name"><span class="form-label">スキル名</span></label>
            <input type="text" id="name" th:field="*{name}" required>
          </div>

          <div class="form-row">
            <label for="proficiency"><span class="form-label">習熟度</span><span class="form-key">1=主力 / 2=よく使う / 3=触ったことある</span></label>
            <select id="proficiency" th:field="*{proficiency}">
              <option value="1">1 — 主力</option>
              <option value="2">2 — よく使う</option>
              <option value="3">3 — 触ったことある</option>
            </select>
          </div>

          <div class="form-row">
            <label for="sortOrder"><span class="form-label">表示順</span><span class="form-key">同じ習熟度内での並び順、小さいほど上</span></label>
            <input type="number" id="sortOrder" th:field="*{sortOrder}">
          </div>

          <div class="form-row">
            <label>
              <input type="checkbox" th:field="*{published}">
              <span class="form-label">公開する</span>
            </label>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">保存</button>
            <a href="/admin/skills" class="btn-cancel">キャンセル</a>
          </div>
        </form>
      </div>
    </section>
  </main>

</body>

</html>
