<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>スキル — Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/admin :: header}"></header>

  <main>
    <section class="admin-edit">
      <div class="container">
        <div class="breadcrumb">
          <a href="/admin">← ダッシュボード</a>
        </div>

        <h1 class="page-title">スキル</h1>
        <p class="hint">習熟度: 1=主力 / 2=よく使う / 3=触ったことある</p>

        <div th:if="${message}" class="alert alert-info" th:text="${message}">保存しました</div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}">エラー</div>

        <div class="admin-list-actions">
          <a href="/admin/skills/new" class="btn-primary">＋ 新規作成</a>
        </div>

        <ul class="admin-list">
          <li class="admin-list-item" th:each="skill : ${skills}">
            <div>
              <span class="item-title" th:text="${skill.name}">スキル名</span>
              <span th:unless="${skill.published}" class="badge-draft">非公開</span>
              <p class="item-meta">
                <span th:text="|習熟度 ${skill.proficiency}|">習熟度 1</span> ·
                <span th:text="|sort: ${skill.sortOrder}|">sort: 0</span>
              </p>
            </div>
            <div class="item-actions">
              <a th:href="@{|/admin/skills/${skill.id}/edit|}">編集</a>
              <form method="post" th:action="@{|/admin/skills/${skill.id}/delete|}"
                    onsubmit="return confirm('削除しますか？');" style="display: inline;">
                <button type="submit" class="item-delete">削除</button>
              </form>
            </div>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/admin :: footer}"></footer>

</body>

</html>
