<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>写真 — Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/admin :: header}"></header>

  <main>
    <section class="admin-edit">
      <div class="container">
        <div class="breadcrumb">
          <a href="/admin">← ダッシュボード</a>
        </div>

        <h1 class="page-title">顔写真</h1>
        <p class="hint">トップページ右側に表示される顔写真。アップロードすると <code>hero.photoUrl</code> が自動で差し替わる。</p>

        <div th:if="${message}" class="alert alert-info" th:text="${message}">アップロードしました</div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}">エラー</div>

        <div class="photo-current">
          <p class="form-label">現在の写真</p>
          <div th:if="${!#strings.isEmpty(currentPhotoUrl)}" class="photo-preview">
            <img th:src="${currentPhotoUrl}" alt="現在の顔写真">
            <p class="form-key" th:text="${currentPhotoUrl}">/media/1</p>
          </div>
          <p th:if="${#strings.isEmpty(currentPhotoUrl)}" class="hint">未設定（プレースホルダ表示）</p>
        </div>

        <form method="post" th:action="@{/admin/media}" enctype="multipart/form-data" class="edit-form">
          <div class="form-row">
            <label for="file">新しい写真を選ぶ</label>
            <input type="file" id="file" name="file" accept="image/*" required>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">アップロード</button>
            <a href="/admin" class="btn-cancel">キャンセル</a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/admin :: footer}"></footer>

</body>

</html>
