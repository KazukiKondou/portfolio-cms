<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>サイト設定 — Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/admin :: header}"></header>

  <main>
    <section class="admin-edit">
      <div class="container">
        <div class="breadcrumb">
          <a href="/admin">← ダッシュボード</a>
        </div>

        <h1 class="page-title">サイト設定</h1>
        <p class="hint">ヘッダ・ナビ・自己紹介などの文言。保存すると公開サイトに反映される。</p>

        <div th:if="${message}" class="alert alert-info" th:text="${message}">保存しました</div>

        <form method="post" th:action="@{/admin/settings}" th:object="${form}" class="edit-form">

          <div th:each="entry, iter : ${form.entries}" class="form-row">
            <label th:for="${entry.key}">
              <span class="form-label" th:text="${entry.description ?: entry.key}">説明</span>
              <span class="form-key" th:text="${entry.key}">key</span>
            </label>

            <input type="hidden" th:name="|entries[${iter.index}].key|" th:value="${entry.key}">

            <textarea th:if="${entry.longText}"
                      th:id="${entry.key}"
                      th:name="|entries[${iter.index}].value|"
                      th:text="${entry.value}"
                      rows="4"></textarea>

            <input th:unless="${entry.longText}"
                   type="text"
                   th:id="${entry.key}"
                   th:name="|entries[${iter.index}].value|"
                   th:value="${entry.value}">
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">保存</button>
            <a href="/admin" class="btn-cancel">キャンセル</a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/admin :: footer}"></footer>

</body>

</html>
