<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${isNew} ? '作品 新規作成 — Admin' : '作品 編集 — Admin'">作品 — Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/admin :: header}"></header>

  <main>
    <section class="admin-edit">
      <div class="container">
        <div class="breadcrumb">
          <a href="/admin/works">← 作品一覧</a>
        </div>

        <h1 class="page-title" th:text="${isNew} ? '新規作成' : '編集'">編集</h1>

        <form method="post"
              th:action="${isNew} ? @{/admin/works} : @{|/admin/works/${work.id}|}"
              th:object="${work}" class="edit-form">

          <div class="form-row">
            <label for="title"><span class="form-label">タイトル</span></label>
            <input type="text" id="title" th:field="*{title}" required>
          </div>

          <div class="form-row">
            <label for="summary"><span class="form-label">サマリー</span><span class="form-key">一覧に表示される短い説明</span></label>
            <textarea id="summary" th:field="*{summary}" rows="2"></textarea>
          </div>

          <div class="form-row">
            <label for="tags"><span class="form-label">タグ</span><span class="form-key">"React · Express" のように区切り文字込みで</span></label>
            <input type="text" id="tags" th:field="*{tags}">
          </div>

          <div class="form-row">
            <label for="url"><span class="form-label">URL</span><span class="form-key">GitHub やデモのリンク</span></label>
            <input type="url" id="url" th:field="*{url}">
          </div>

          <div class="form-row">
            <label for="description"><span class="form-label">詳細説明</span><span class="form-key">今は使ってないが将来詳細ページ用</span></label>
            <textarea id="description" th:field="*{description}" rows="6"></textarea>
          </div>

          <div class="form-row">
            <label for="sortOrder"><span class="form-label">表示順</span><span class="form-key">小さいほど上</span></label>
            <input type="number" id="sortOrder" th:field="*{sortOrder}">
          </div>

          <div class="form-row">
            <label>
              <input type="checkbox" th:field="*{published}">
              <span class="form-label">公開する</span>
            </label>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">保存</button>
            <a href="/admin/works" class="btn-cancel">キャンセル</a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/admin :: footer}"></footer>

</body>

</html>
