spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # 両方が起動時 migrate を試みても Flyway の lock で安全
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  thymeleaf:
    cache: true

server:
  # site と被らない別ポート
  port: 8081
  # Reverse proxy 越しのリクエストにも対応 (Tailscale 経由でも素の HTTP だが念のため)
  forward-headers-strategy: framework

app:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
