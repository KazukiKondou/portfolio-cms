spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: true

server:
  port: 8080
  # Cloudflare Tunnel 越しに HTTPS リクエストが来るので X-Forwarded-* を尊重する
  forward-headers-strategy: framework
