<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="|Works — ${settings['site.title']}|">Works — Kondo</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/site :: header}"></header>

  <main>
    <section class="works">
      <div class="container">
        <h1 class="page-title">Works</h1>
        <ul class="works-list">
          <li class="works-item" th:each="work : ${works}">
            <a class="works-link" th:href="${work.url}" target="_blank" rel="noopener" th:text="${work.title}">weather-board</a>
            <p class="works-tags" th:text="${work.tags}">React · Express · OpenWeather API</p>
            <p class="works-summary" th:text="${work.summary}">天気予報アプリ。位置情報から3日間の予報を表示する。</p>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/site :: footer}"></footer>

</body>

</html>
