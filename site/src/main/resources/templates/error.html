<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="|${status ?: 'Error'} — ${settings['site.title']}|">Error — Kondo</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/site :: header}"></header>

  <main>
    <section class="hero">
      <div class="container">
        <h1 style="font-family: 'Iowan Old Style', 'Hoefler Text', Georgia, serif; font-size: 56px; font-weight: 400; line-height: 1.05;"
            th:text="${status} ?: 'Error'">404</h1>
        <p class="lead" th:text="${error} ?: 'ページが見つかりませんでした。'">Not Found</p>
        <p class="intro">
          <a href="/">← ホームに戻る</a>
        </p>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/site :: footer}"></footer>

</body>

</html>
