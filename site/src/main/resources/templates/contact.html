<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="|Contact — ${settings['site.title']}|">Contact — Kondo</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/site :: header}"></header>

  <main>
    <section class="contact">
      <div class="container">
        <h1 class="page-title">Contact</h1>
        <p class="hint">ご連絡いただければなるべく早く返信します。</p>

        <div th:if="${submitted}" class="alert alert-info">
          メッセージを受け付けました。ありがとうございます。
        </div>

        <form method="post" th:action="@{/contact}" th:object="${contactForm}" class="edit-form">
          <div class="form-row">
            <label for="name"><span class="form-label">お名前</span></label>
            <input type="text" id="name" th:field="*{name}" maxlength="100" required>
            <p class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">エラー</p>
          </div>

          <div class="form-row">
            <label for="email"><span class="form-label">メールアドレス</span></label>
            <input type="email" id="email" th:field="*{email}" maxlength="255" required>
            <p class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">エラー</p>
          </div>

          <div class="form-row">
            <label for="message"><span class="form-label">メッセージ</span></label>
            <textarea id="message" th:field="*{message}" maxlength="5000" rows="8" required></textarea>
            <p class="form-error" th:if="${#fields.hasErrors('message')}" th:errors="*{message}">エラー</p>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">送信</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/site :: footer}"></footer>

</body>

</html>
