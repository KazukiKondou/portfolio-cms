spring:
  application:
    name: portfolio-site

  # 開発時は H2 のインメモリ。本番は PostgreSQL に切り替える
  datasource:
    url: jdbc:h2:mem:portfolio;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

server:
  port: 8080
