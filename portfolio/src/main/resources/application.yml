spring:
  application:
    name: portfolio-site

  # 開発時は H2 ファイルモード。AUTO_SERVER=TRUE で site と admin を同じDBに繋ぐ
  # 本番では PostgreSQL に切り替える (application-prod.yml)
  datasource:
    url: jdbc:h2:file:${user.home}/portfolio-cms-data/portfolio;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

server:
  port: 8080
