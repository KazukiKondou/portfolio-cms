<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="|Works — ${settings['site.title']}|">Works — Kondo</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/site :: header}"></header>

  <main>
    <section class="works">
      <div class="container">
        <h1 class="page-title">Works</h1>
        <ul class="works-list">
          <li class="works-item" th:each="work : ${works}">
            <!-- URL があれば外部リンク、無ければただのテキスト -->
            <a th:if="${!#strings.isEmpty(work.url)}" class="works-link"
               th:href="${work.url}" target="_blank" rel="noopener" th:text="${work.title}">weather-board</a>
            <span th:if="${#strings.isEmpty(work.url)}" class="works-link works-link-plain"
                  th:text="${work.title}">weather-board</span>

            <p class="works-tags" th:if="${!#strings.isEmpty(work.tags)}" th:text="${work.tags}">React · Express</p>
            <p class="works-summary" th:if="${!#strings.isEmpty(work.summary)}" th:text="${work.summary}">サマリー</p>
            <p class="works-description" th:if="${!#strings.isEmpty(work.description)}" th:text="${work.description}">詳細</p>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/site :: footer}"></footer>

</body>

</html>
