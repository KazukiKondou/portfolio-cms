<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="|${settings['site.title']} — Portfolio|">Kondo — Portfolio</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

  <header th:replace="~{fragments/site :: header}"></header>

  <main>
    <section class="hero">
      <div class="container">
        <h1><span th:text="${settings['site.title']}">Kondo</span><span class="accent-dot">.</span></h1>
        <p class="lead" th:text="${settings['hero.tagline']}">Software Engineer / 静岡</p>
        <p class="intro" th:text="${settings['hero.intro']}">
          Web を中心にバックエンド〜インフラまで触っているエンジニアです。
          最近は Spring Boot と TypeScript を使うことが多いです。
        </p>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/site :: footer}"></footer>

</body>

</html>
