services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  site:
    build:
      context: .
      dockerfile: Dockerfile.site
    # Cloudflare Tunnel 経由で公開する想定。ホストの 8080 にだけ流す
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/portfolio
      DATABASE_USER: portfolio
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - internal

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    # Tailscale IF にだけ bind する。${TAILSCALE_IP} は kondo-home-server のタスIP
    # 外には絶対出さないように 127.0.0.1 か tailscale IP のみ
    ports:
      - "${ADMIN_BIND:-127.0.0.1}:8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/portfolio
      DATABASE_USER: portfolio
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
