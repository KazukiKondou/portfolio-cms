services:
  # 軽量な共有 DB (H2 TCP サーバ)。site / admin の両方が接続する
  h2:
    build:
      context: .
      dockerfile: Dockerfile.h2
    volumes:
      - h2_data:/data
    restart: unless-stopped
    networks:
      - internal

  site:
    build:
      context: .
      dockerfile: Dockerfile.site
    # 本番想定: 127.0.0.1 だけ bind して Cloudflare Tunnel 経由で公開
    # Tunnel 設定前のテストなら Tailscale IP を SITE_BIND に入れて preview する
    ports:
      - "${SITE_BIND:-127.0.0.1}:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:h2:tcp://h2:9092//data/portfolio;DB_CLOSE_DELAY=-1
      DATABASE_USER: sa
      DATABASE_PASSWORD: ""
    depends_on:
      - h2
    restart: unless-stopped
    networks:
      - internal

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    # Tailscale IF にだけ bind する。${ADMIN_BIND} は kondo-home-server のタスIP
    # 外には絶対出さないように 127.0.0.1 か tailscale IP のみ
    ports:
      - "${ADMIN_BIND:-127.0.0.1}:8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:h2:tcp://h2:9092//data/portfolio;DB_CLOSE_DELAY=-1
      DATABASE_USER: sa
      DATABASE_PASSWORD: ""
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - h2
    restart: unless-stopped
    networks:
      - internal

volumes:
  h2_data:

networks:
  internal:
